apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-server
  namespace: lab-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns-server
  template:
    metadata:
      labels:
        app: dns-server
    spec:
      containers:
      - name: dns
        image: localhost:5000/dns-lab:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: dns-service
  namespace: lab-network
spec:
  type: NodePort
  selector:
    app: dns-server
  ports:
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
    nodePort: 30053
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
    nodePort: 30053
