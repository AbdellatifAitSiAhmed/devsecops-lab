apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftp-server
  namespace: lab-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftp-server
  template:
    metadata:
      labels:
        app: ftp-server
    spec:
      containers:
      - name: ftp
        image: localhost:5000/ftp-lab:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 21
        - containerPort: 21100
        - containerPort: 21101
        - containerPort: 21102
        - containerPort: 21103
        - containerPort: 21104
        - containerPort: 21105
---
apiVersion: v1
kind: Service
metadata:
  name: ftp-service
  namespace: lab-network
spec:
  type: NodePort
  selector:
    app: ftp-server
  ports:
  - name: ftp
    port: 21
    targetPort: 21
    nodePort: 30021
  - name: pasv1
    port: 21100
    targetPort: 21100
    nodePort: 31100
  - name: pasv2
    port: 21101
    targetPort: 21101
    nodePort: 31101
  - name: pasv3
    port: 21102
    targetPort: 21102
    nodePort: 31102
  - name: pasv4
    port: 21103
    targetPort: 21103
    nodePort: 31103
  - name: pasv5
    port: 21104
    targetPort: 21104
    nodePort: 31104
  - name: pasv6
    port: 21105
    targetPort: 21105
    nodePort: 31105
